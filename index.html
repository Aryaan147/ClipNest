<!DOCTYPE html>
<html>
<head>
  <title>My First Clipnest Project</title>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>

  <!-- top menu -->
  <div class="myheader" id="topHeader">
    <div style="float: left;">
      <h1 style="color: orange; display: inline;"># ClipNest</h1>
      <span style="font-size: 10px;">v1</span>
    </div>
    <div style="float: right;">
      <button onclick="openNewModal()" style="background-color: orange; border: none; padding: 10px; cursor: pointer;">Add New Clip</button>
    </div>
    <div style="clear: both;"></div>
  </div>

  <div id="wrapper">
    
    <!-- sidebar area -->
    <div class="mysidebar">
      <b>MY LIBRARY</b><br><br>
      
      <div onclick="changeFolder('All')" class="folder" style="cursor: pointer; padding: 5px;">
        All Clips (<span id="count-All">0</span>)
      </div>

      <br><b>FOLDERS</b><br><br>
      <div id="folderList"></div>
      <br>

      <button id="addFolderBtn" onclick="showFolderInput()" style="cursor: pointer;">Create New Folder</button>

      <div id="folderInputBox" class="hidden">
        <input type="text" id="folderNameInput" placeholder="name here..." />
        <br><br>
        <button onclick="addNewFolder()">Save</button>
        <button onclick="hideFolderInput()">X</button>
      </div>

      <br><br><br>
      <b>TRASH</b><br>
      <div class="folder" onclick="changeFolder('Trash')" style="cursor: pointer; padding: 5px;">
        Recycle Bin (<span id="count-Trash">0</span>)
      </div>
    </div>

    <!-- main stuff -->
    <div class="mymain">

      <center>
        <input type="text" id="searchInput" placeholder="Search my clips..." onkeyup="searchClips()" style="width: 50%; padding: 10px;" />
      </center>
      <br>

      <div style="border-bottom: 2px solid grey; padding-bottom: 10px; margin-bottom: 20px;">
        <h2 id="sectionTitle" style="display: inline;">All Clips</h2>
        <span id="clipCountLabel" style="color: gray;">0 clips</span>
        
        <select id="sortSelect" onchange="changeSort()" style="float: right;">
          <option value="Newest">New</option>
          <option value="Oldest">Old</option>
          <option value="A-Z">A to Z</option>
        </select>
        <div style="clear: both;"></div>
      </div>

      <div id="clipsGrid"></div>
      <div style="clear: both;"></div>

      <!-- empty message -->
      <div id="emptyState" class="hidden" style="text-align: center; margin-top: 50px;">
        <h1 style="color: gray;">No clips found!!!</h1>
        <p id="emptyMsg">It is empty.</p>
        <p id="emptySub">You should add something.</p>
      </div>

    </div>
    <div style="clear: both;"></div>
  </div>

  <!-- popup -->
  <div id="modalOverlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100;">
    <div style="background: #222; width: 500px; margin: 100px auto; padding: 20px; color: white;">
      
      <h2 id="modalTitle">New Clip</h2>
      <hr>
      <br>

      <p>TITLE:</p>
      <input type="text" id="clipTitle" style="width: 100%;" />
      <br><br>

      <p>CONTENT:</p>
      <textarea id="clipContent" style="width: 100%; height: 100px;" onkeyup="updateCounters()"></textarea>
      <br>
      <span id="counterLabel" style="font-size: 12px; color: gray;">0 words</span>
      <br><br>

      <p>FOLDER:</p>
      <select id="clipFolder" style="width: 100%;"></select>
      <br><br><br>

      <button onclick="saveClip()" id="saveBtn" style="background: orange; border: none; padding: 10px;">Save It</button>
      <button onclick="closeModal()" style="padding: 10px;">Cancel</button>

    </div>
  </div>

  <div id="moveMenu" class="hidden" style="position: absolute; background: black; border: 1px solid white; padding: 10px;"></div>

  <script src="app.js"></script>
</body>
</html>
